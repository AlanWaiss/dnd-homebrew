<p>The magic of your runes permanently alters you.</p>
<p><em><strong>Growth.</strong></em> When you gain this feature, roll 3d4. You grow a number of inches in height equal to the roll.</p>
<p><em><strong>Colossal Force.</strong></em> While your Giant&rsquo;s Might feature is active, the additional damage from Gigantic Force is no longer limited to one attack per turn.</p>
